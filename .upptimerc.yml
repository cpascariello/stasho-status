owner: cpascariello
repo: stasho-status

sites:
  - name: Stasho App
    url: https://app.stasho.xyz
  - name: Stasho API
    url: https://api.stasho.xyz/api/health
  - name: Aleph CCN
    url: https://api.aleph.im/api/v0/info/public.json

status-website:
  cname: status.stasho.xyz
  name: Stasho status
  theme: dark
  introTitle: "Stasho platform status"
  introMessage: >
    Independent live monitor of the Stasho platform, hosted off our own
    infrastructure so it stays reachable even when Stasho does not. Your
    deployed sites are pinned on IPFS and keep serving no matter what this
    board shows. See the status guide at docs.stasho.xyz for what each
    signal means.
  navbar:
    - title: App
      href: https://app.stasho.xyz
    - title: Docs
      href: https://docs.stasho.xyz
  customHeadHtml: >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anybody:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  # Stasho "Abyssal Void" skin: token values mirrored from @stasho/ds
  # tokens.css (dark scheme). html:root outranks the stock theme's :root
  # regardless of stylesheet order.
  css: |
    html:root {
      --body-background-color: #07080a;
      --body-text-color: #f3f3f3;
      --card-background-color: oklch(0.18 0.005 273);
      --card-border-color: rgba(255, 255, 255, 0.10);
      --nav-background-color: #07080a;
      --nav-border-bottom-color: rgba(255, 255, 255, 0.10);
      --nav-current-border-bottom-color: #00E1FA;
      --tag-color: #07080a;
      --error-button-border-color: #0040FF;
      --error-button-background-color: #0040FF;
      --error-button-color: #ffffff;
      --submit-button-border-color: #0040FF;
      --submit-button-background-color: #0040FF;
      --submit-button-color: #ffffff;
    }
    body {
      font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
    }
    h1, h2, h3, h4, h5, h6 {
      font-family: "Anybody", ui-sans-serif, system-ui, sans-serif;
      font-weight: 700;
    }
    a {
      text-decoration-color: rgba(0, 225, 250, 0.4);
    }
    a:hover {
      color: #00E1FA;
    }

assignees:
  - cpascariello
