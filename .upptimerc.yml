owner: cpascariello
repo: stasho-status

sites:
  - name: Stasho App
    url: https://app.stasho.xyz
  - name: Stasho API
    url: https://api.stasho.xyz/api/health
  - name: Aleph CCN
    url: https://api.aleph.im/api/v0/info/public.json

status-website:
  cname: status.stasho.xyz
  name: Stasho status
  introTitle: "Stasho platform status"
  introMessage: >
    Independent live monitor of the Stasho platform, hosted off our own
    infrastructure so it stays reachable even when Stasho does not. Your
    deployed sites are pinned on IPFS and keep serving no matter what this
    board shows. See the status guide at docs.stasho.xyz for what each
    signal means.
  theme: dark
  navbar:
    - title: App
      href: https://app.stasho.xyz
    - title: Docs
      href: https://docs.stasho.xyz

assignees:
  - cpascariello
